name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and package tests
        run: npm test

      - name: Private signet auto-miner script smoke
        run: npm run test:private-signet-auto-mine-script

      - name: Install Playwright browser
        run: npm run playwright:install

      - name: Browser fixture smoke
        run: npm run test:e2e:fixture-web
